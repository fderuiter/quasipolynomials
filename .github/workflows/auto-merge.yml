name: Auto Approve and Merge Non-Core PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-approve-merge:
    name: Auto Approve and Merge
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Fetch PR files
        id: files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json files --jq '.files[].path' > pr_files.txt
          echo "Files modified in PR:"
          cat pr_files.txt

      - name: Check for core directory or cryptographic audit logic modifications
        id: check
        run: |
          CORE_TOUCHED=0
          while IFS= read -r file; do
            if [[ "$file" == *"rust-engine/"* ]] || \
               [[ "$file" == *"lean4-proofs/"* ]] || \
               [[ "$file" == *"verify_cert.py" ]] || \
               [[ "$file" == *"auditor.py" ]] || \
               [[ "$file" == *"cert_util.py" ]]; then
               echo "Core file modified: $file"
               CORE_TOUCHED=1
            fi
          done < pr_files.txt
          echo "core_touched=$CORE_TOUCHED" >> $GITHUB_OUTPUT

      - name: Approve and Auto-Merge
        if: steps.check.outputs.core_touched == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --approve -b "Automated approval for non-core changes." || true
          gh pr merge ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --auto --squash || \
          gh pr merge ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --squash || \
          echo "Auto-merge failed, likely due to pending checks or disabled auto-merge setting."
