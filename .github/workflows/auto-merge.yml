name: Auto Approve and Merge Non-Core PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-approve-merge:
    name: Auto Approve and Merge
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch PR files
        id: files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json files --jq '.files[].path' > pr_files.txt
          echo "Files modified in PR:"
          cat pr_files.txt

      - name: Check for core directory or cryptographic audit logic modifications
        id: check
        run: |
          is_core_file() {
            local f="$1"
            # Block if it touches core directories
            if [[ "$f" == *"rust-engine/"* ]] || \
               [[ "$f" == *"lean4-proofs/"* ]] || \
               [[ "$f" == *"verification-lib/"* ]]; then
               return 0
            fi
            # Block if it is a critical manifest/config file
            if [[ "$f" == *"bounds_manifest.json"* ]] || \
               [[ "$f" == *"metadata_manifest.json"* ]] || \
               [[ "$f" == *"schema_manifest.json"* ]] || \
               [[ "$f" == *"proof_manifest.json"* ]] || \
               [[ "$f" == *"docs_manifest.json"* ]] || \
               [[ "$f" == *"Cargo.toml"* ]] || \
               [[ "$f" == *"Cargo.lock"* ]] || \
               [[ "$f" == *"flake.nix"* ]] || \
               [[ "$f" == *"flake.lock"* ]] || \
               [[ "$f" == *"Makefile"* ]]; then
               return 0
            fi
            # Block if it is a core python script/library (direct files under ualbf-project/)
            if [[ "$f" == "ualbf-project/auditor.py" ]] || \
               [[ "$f" == "ualbf-project/cert_util.py" ]] || \
               [[ "$f" == "ualbf-project/verify_cert.py" ]] || \
               [[ "$f" == "ualbf-project/verify_metadata.py" ]] || \
               [[ "$f" == "ualbf-project/time_utils.py" ]]; then
               return 0
            fi
            # Block if it is a .github workflow or action
            if [[ "$f" == *".github/"* ]]; then
               return 0
            fi
            return 1
          }

          CORE_TOUCHED=0
          while IFS= read -r file; do
            if is_core_file "$file"; then
               echo "Core file modified: $file"
               CORE_TOUCHED=1
            fi
          done < pr_files.txt
          
          # Check docs manifest dynamically
          # We use our validation engine explicitly
          python3 ualbf-project/scripts/validate_docs.py pr_files.txt > doc_validation.log
          cat doc_validation.log
          if grep -q "AUTHORITATIVE_TOUCHED=1" doc_validation.log; then
             echo "Authoritative document modified. Blocking auto-merge."
             CORE_TOUCHED=1
          fi

          echo "core_touched=$CORE_TOUCHED" >> $GITHUB_OUTPUT

      - name: Approve and Auto-Merge
        if: steps.check.outputs.core_touched == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --approve -b "Automated approval for non-core changes." || echo "Could not approve PR (may already be approved or lack permissions)."
          gh pr merge ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --auto --squash || \
          echo "Could not merge PR automatically. It may require manual merge or checks are failing."
