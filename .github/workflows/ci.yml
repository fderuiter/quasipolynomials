name: Verification Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v3

    - name: Install Nix
      uses: cachix/install-nix-action@v22
      with:
        nix_path: nixpkgs=channel:nixos-unstable

    - name: Build and verify reproducibility (Nix)
      run: |
        nix build -L
        export UALBF_TARGET_MIN_LOG10=35
        export UALBF_TARGET_MAX_LOG10=37
        export UALBF_SIEVE_LIMIT=1000
        ./result/bin/ualbf_engine

