name: Unified Publication & Verification Build

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  core-gating:
    name: Core Nix Verification Gating
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            sandbox = true

      - name: Detect Nix Architecture
        run: |
          NIX_ARCH=$(nix eval --raw --impure --expr 'builtins.currentSystem')
          echo "NIX_ARCH=$NIX_ARCH" >> $GITHUB_ENV

      - name: Run Formatting Check
        run: nix build .#checks.${NIX_ARCH:-$(nix eval --raw --impure --expr 'builtins.currentSystem')}.formatting

      - name: Run Warnings Check
        run: nix build .#checks.${NIX_ARCH:-$(nix eval --raw --impure --expr 'builtins.currentSystem')}.warnings

      - name: Run Rust Literals Check
        run: nix build .#checks.${NIX_ARCH:-$(nix eval --raw --impure --expr 'builtins.currentSystem')}.rust-literals

      - name: Run LaTeX Paper Verification
        run: nix build .#checks.${NIX_ARCH:-$(nix eval --raw --impure --expr 'builtins.currentSystem')}.latex-paper

      - name: Prepare PDF Artifact
        if: success()
        run: |
          OUT_PATH=$(nix build .#checks.${NIX_ARCH:-$(nix eval --raw --impure --expr 'builtins.currentSystem')}.latex-paper --print-out-paths)
          cp "$OUT_PATH/main.pdf" ./main.pdf

      - name: Upload Compiled PDF
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: compiled-paper
          path: main.pdf
          if-no-files-found: error

  verify-verus:
    name: Verus Semantic Verification
    runs-on: ubuntu-latest
    needs: core-gating
    steps:
      - uses: actions/checkout@v4

      - name: Cache Verus Binary
        uses: actions/cache@v4
        id: cache-verus
        with:
          path: ~/.local/bin/verus-dir
          key: verus-0.2026.07.18.3a4d30b-x86-linux

      - name: Install required Rust toolchain
        run: rustup toolchain install 1.96.0-x86_64-unknown-linux-gnu

      - name: Download Precompiled Verus
        if: steps.cache-verus.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin/verus-dir
          cd ~/.local/bin/verus-dir
          curl -sL https://github.com/verus-lang/verus/releases/download/release/0.2026.07.18.3a4d30b/verus-0.2026.07.18.3a4d30b-x86-linux.zip -o verus.zip
          unzip -q verus.zip
          rm verus.zip
          find . -type f -exec chmod +x {} + || true

      - name: Add Verus to PATH
        run: |
          VERUS_PATH=$(find ~/.local/bin/verus-dir -type f -name verus | head -n 1)
          echo "$(dirname $VERUS_PATH)" >> $GITHUB_PATH

      - name: Install Required Rust Toolchain
        run: rustup toolchain install 1.96.0-x86_64-unknown-linux-gnu

      - name: Run Semantic Verification on Proof Blocks
        run: |
          cd ualbf-project/rust-engine/src
          verus --crate-type=lib verus_proofs.rs

  verify-and-build:
    name: Build and Verify
    runs-on: ubuntu-latest
    needs: core-gating
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nix (Linux)
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            sandbox = true

      - name: Cache Build Artifacts
        continue-on-error: true
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ualbf-project/rust-engine
          cache-on-failure: true

      - name: Run Unified Quality Checks
        run: nix develop --command bash -c "cd ualbf-project && make check"

      - name: Verify Workspace Cleanliness
        run: nix develop --command bash -c "cd ualbf-project && make verify-sync"

      - name: Run Core Logic Tests (dfs_tree)
        run: nix develop --command bash -c "cd ualbf-project/rust-engine && cargo test --release dfs_tree"

      - name: Run Core Logic Tests (lean_ffi)
        run: nix develop --command bash -c "cd ualbf-project/rust-engine && cargo test --release lean_ffi"

  verify-macos:
    name: macOS Compilation Verification
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nix (macOS)
        continue-on-error: true
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Cache Build Artifacts
        continue-on-error: true
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ualbf-project/rust-engine
          cache-on-failure: true

      - name: Compile Target-Specific Frameworks
        continue-on-error: true
        run: nix develop --command bash -c "cd ualbf-project && make rust"
