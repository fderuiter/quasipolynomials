name: Unified Publication & Verification Build

on:
  push:
  pull_request:

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          pip install -e .[dev]
          pip install -e ualbf-project/verification-lib

      - name: Python Format Check
        run: ruff format --check ualbf-project

      - name: Python Lint Check
        run: ruff check ualbf-project

      - name: Python Unit Tests
        run: pytest ualbf-project/tests ualbf-project/paper

      - name: Setup Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Cache Build Artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ualbf-project/rust-engine
          cache-on-failure: true

      - name: Run Lean Logic Auditor
        run: nix develop --command bash -c "cd ualbf-project && python3 auditor.py"

      - name: Run Core Logic Tests (dfs_tree)
        run: nix develop --command bash -c "cd ualbf-project/rust-engine && cargo test --release dfs_tree"

      - name: Run Core Logic Tests (lean_ffi)
        run: nix develop --command bash -c "cd ualbf-project/rust-engine && cargo test --release lean_ffi"
