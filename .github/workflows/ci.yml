name: Unified Publication & Verification Build

on: [push, pull_request]

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build Lean and Rust Engine
        run: nix develop --command bash -c "cd ualbf-project && make all"

      - name: Run Engine Verification
        run: nix develop --command bash -c "cd ualbf-project/rust-engine && UALBF_PROOF_MANIFEST=../proof_manifest.json cargo run --release"

      - name: Cryptographically Verify Certificate
        run: nix develop --command bash -c "cd ualbf-project && python3 verify_cert.py --cert rust-engine/formal_certificate.json --manifest proof_manifest.json"

      - name: Ingest Telemetry into Paper
        run: nix develop --command bash -c "cd ualbf-project/paper && UALBF_CERT_PATH='${{ github.workspace }}/ualbf-project/rust-engine/formal_certificate.json' python3 ingest_cert.py"

      - name: Archive Telemetry Artifact
        uses: actions/upload-artifact@v4
        with:
          name: telemetry-macros
          path: ualbf-project/paper/telemetry.tex
