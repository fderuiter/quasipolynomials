name: Unified Publication & Verification Build

on:
  push:
  pull_request:

jobs:
  formatting-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run Formatting Check
        run: nix build .#formatting-check -L > formatting.log 2>&1 || (cat formatting.log; exit 1)

      - name: Upload Formatting Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formatting-log
          path: formatting.log

  warning-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run Warning Check
        run: nix build .#warning-check -L > warning.log 2>&1 || (cat warning.log; exit 1)

      - name: Upload Warning Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: warning-log
          path: warning.log

  verify-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Cache Build Artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ualbf-project/rust-engine
          cache-on-failure: true

      - name: Run Lean Logic Auditor
        run: nix develop --command bash -c "cd ualbf-project && python3 auditor.py"

      - name: Run Core Logic Tests (dfs_tree)
        run: nix develop --command bash -c "cd ualbf-project/rust-engine && cargo test --release dfs_tree"

      - name: Run Core Logic Tests (lean_ffi)
        run: nix develop --command bash -c "cd ualbf-project/rust-engine && cargo test --release lean_ffi"
