name: Unified Publication & Verification Build

on:
  push:
  pull_request:

jobs:
  core-gating:
    name: Core Nix Verification Gating
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            sandbox = true

      - name: Run Formatting Check
        run: nix build .#checks.x86_64-linux.formatting

      - name: Run Warnings Check
        run: nix build .#checks.x86_64-linux.warnings

      - name: Run Rust Literals Check
        run: nix build .#checks.x86_64-linux.rust-literals

      - name: Run LaTeX Paper Verification
        run: nix build .#checks.x86_64-linux.latex-paper

      - name: Prepare PDF Artifact
        if: success()
        run: cp result/main.pdf ./main.pdf

      - name: Upload Compiled PDF
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: compiled-paper
          path: ./main.pdf
          if-no-files-found: error

  verify-and-build:
    name: Build and Verify
    runs-on: ${{ matrix.os }}
    needs: core-gating
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nix (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            sandbox = true

      - name: Setup Nix (macOS)
        if: matrix.os == 'macos-latest'
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Cache Build Artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ualbf-project/rust-engine
          cache-on-failure: true

      - name: Run Unified Quality Checks
        run: nix develop --command bash -c "cd ualbf-project && make check"

      - name: Run Lean Logic Auditor
        run: nix develop --command bash -c "cd ualbf-project && python3 auditor.py"

      - name: Run Core Logic Tests (dfs_tree)
        run: nix develop --command bash -c "cd ualbf-project/rust-engine && cargo test --release dfs_tree"

      - name: Run Core Logic Tests (lean_ffi)
        run: nix develop --command bash -c "cd ualbf-project/rust-engine && cargo test --release lean_ffi"
